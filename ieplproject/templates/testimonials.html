<!-- Testimonials -->
<section class="wt-section testimonial_section" style="background-color: black; color: white;">
    <div class="container">
        <div class="heading_container heading_center">
            <h2>Testimonials</h2>
        </div>
    </div>
    <div class="container">
        <div class="col-md-9 mx-auto px-0">
            <div id="carouselExample2Controls" class="carousel slide" data-ride="carousel">
            <!-- <ol class="carousel-indicators">
                    <li data-target="#carouselExample2Controls" data-slide-to="0" class="active">
                        <img src="images/c1.jpg" alt="">
                    </li>
                    <li data-target="#carouselExample2Controls" data-slide-to="1">
                        <img src="images/c2.jpg" alt="">
                    </li>
                    <li data-target="#carouselExample2Controls" data-slide-to="2">
                        <img src="images/c3.jpg" alt="">
                    </li>
                </ol> -->
                <div class="carousel-inner">
                    {% for testimonial in testimonials %}
                    <div class="carousel-item {% if forloop.first %}active{% endif %}">
                        <div class="detail-box">
                            <h5>{{testimonial.testimonial_name}}</h5>
                            <h6>{{testimonial.testimonial_position}}, {{testimonial.testimonial_brand}}</h6>
                            <p><i class="fa fa-quote-left" aria-hidden="true"></i>{{testimonial.testimonial_description}}<i class="fa fa-quote-right" aria-hidden="true"></i></p>
                        </div>     
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</section>
